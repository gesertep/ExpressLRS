; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
extra_configs = 
	targets/common.ini
	targets/esp32-tx.ini
	targets/esp32s3-tx.ini
	targets/esp32c3-tx.ini
	targets/esp8285-tx.ini
	targets/esp32-rx.ini
	targets/esp32s3-rx.ini
	targets/esp32c3-rx.ini
	targets/esp8285-rx.ini

[env:native]
platform = native
framework = 
test_ignore = test_embedded
lib_ignore = 
	BUTTON
	DAC
	LQCALC
	LBT
	SPIEx
	PWM
	WIFI
	TCPSOCKET
	LR1121Driver
	SX127xDriver
build_src_filter = ${common_env_data.build_src_filter} -<ESP32*.*> -<ESP8*.*> -<tx_*.cpp> -<rx_*.cpp> -<common.*> -<config.*>
build_flags = 
	-std=c++11
	-Iinclude
	-D PROGMEM=""
	-D UNIT_TEST=1
	-D TARGET_NATIVE
